<!doctype html>
<html>
<head>
<title>e6 var() inside calc()</title>
<style>
:root { --gutter: 24px; --col-w: 120px; }
body { margin: 0; padding: 0; }
.full  { width: calc(100% - var(--gutter) * 2); height: 24px; background: #c33; margin: 8px var(--gutter); }
.col   { width: calc(var(--col-w) + 40px); height: 24px; background: #3c3; margin: 8px var(--gutter); }
.combo { width: calc(var(--col-w) * 2 + var(--gutter)); height: 24px; background: #33c; margin: 8px var(--gutter); }
</style>
</head>
<body>
<div class="full">100% - --gutter * 2 (240px on a default viewport)</div>
<div class="col">--col-w + 40 = 160px</div>
<div class="combo">--col-w * 2 + --gutter = 264px</div>
</body>
</html>

<!doctype html>
<html>
<head>
<title>h3 linear-gradient</title>
<style>
body { margin: 0; padding: 16px; font-family: sans-serif; }
.tile {
  width: 220px;
  height: 64px;
  margin-bottom: 12px;
  padding: 12px;
  color: white;
  font-weight: bold;
  border-radius: 6px;
  box-sizing: border-box;
}
.t1 { background: linear-gradient(#36c, #6cf); }
.t2 { background: linear-gradient(to top,    #c33, #fc6); }
.t3 { background: linear-gradient(to right,  #393, #cf9); }
.t4 { background: linear-gradient(to left,   #555, #ccc); }
.t5 { background: linear-gradient(0deg,   #803, #f6c); }
.t6 { background: linear-gradient(90deg,  #036, #6cf); }
.t7 { background: linear-gradient(180deg, #630, #f93); }
.t8 { background: linear-gradient(270deg, #036, #06c); }
</style>
</head>
<body>
<div class="tile t1">linear-gradient(c1, c2) [default to bottom]</div>
<div class="tile t2">linear-gradient(to top,    c1, c2)</div>
<div class="tile t3">linear-gradient(to right,  c1, c2)</div>
<div class="tile t4">linear-gradient(to left,   c1, c2)</div>
<div class="tile t5">linear-gradient(0deg,   c1, c2) [up]</div>
<div class="tile t6">linear-gradient(90deg,  c1, c2) [right]</div>
<div class="tile t7">linear-gradient(180deg, c1, c2) [down]</div>
<div class="tile t8">linear-gradient(270deg, c1, c2) [left]</div>
</body>
</html>

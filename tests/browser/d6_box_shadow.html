<!doctype html>
<title>box-shadow</title>
<style>
.box {
  width: 200px; height: 80px;
  background: #fff;
  border: 1px solid #404040;
  margin: 30px;
  padding: 16px;
  box-shadow: 6px 6px #888;
}
.round {
  width: 200px; height: 80px;
  background: #ffe080;
  border: 1px solid #806040;
  margin: 30px;
  padding: 16px;
  border-radius: 12px;
  box-shadow: 4px 4px #404040;
}
</style>
<div class="box">Box with hard shadow.</div>
<div class="round">Rounded with shadow.</div>

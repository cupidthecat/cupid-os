<!doctype html>
<title>@font-face weights</title>
<style>
@font-face { font-family:'TestSans'; src:url('/system/fonts/LiberationSans-Regular.ttf') format('truetype'); font-weight:400; }
@font-face { font-family:'TestSans'; src:url('/system/fonts/LiberationSans-Regular.ttf') format('truetype'); font-weight:700; }
p.r { font-family:'TestSans'; font-weight:400; font-size:20px; }
p.b { font-family:'TestSans'; font-weight:700; font-size:20px; }
</style>
<p class="r">Regular weight rendering.</p>
<p class="b">Bold weight rendering.</p>

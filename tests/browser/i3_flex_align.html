<!doctype html>
<html>
<head>
<title>i3 align-items</title>
<style>
body { margin: 0; padding: 16px; font-family: sans-serif; }
.lbl { font-weight: bold; margin: 12px 0 4px 0; font-size: 13px; }
.row {
  display: flex;
  gap: 8px;
  background: #eef;
  padding: 8px;
  height: 100px;
  margin-bottom: 8px;
}
.box {
  background: #36c;
  color: white;
  padding: 6px 12px;
  border-radius: 4px;
  width: 70px;
  text-align: center;
}
.t  { height: 24px; }
.m  { height: 48px; }
.tall { height: 80px; }
.s  { align-items: flex-start; }
.e  { align-items: flex-end; }
.c  { align-items: center; }
.st { align-items: stretch; }
</style>
</head>
<body>
<div class="lbl">align-items: flex-start</div>
<div class="row s"><div class="box t">A</div><div class="box m">B</div><div class="box tall">C</div></div>
<div class="lbl">align-items: flex-end</div>
<div class="row e"><div class="box t">A</div><div class="box m">B</div><div class="box tall">C</div></div>
<div class="lbl">align-items: center</div>
<div class="row c"><div class="box t">A</div><div class="box m">B</div><div class="box tall">C</div></div>
<div class="lbl">align-items: stretch (no explicit height fills)</div>
<div class="row st"><div class="box">A</div><div class="box">B</div><div class="box">C</div></div>
</body>
</html>

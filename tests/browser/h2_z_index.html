<!doctype html>
<html>
<head>
<title>h2 z-index stacking</title>
<style>
body { margin: 0; padding: 16px; font-family: sans-serif; }
.frame {
  position: relative;
  width: 360px;
  height: 220px;
  background: #f4f4f4;
  border: 1px solid #aaa;
}
.box {
  position: absolute;
  width: 120px;
  height: 80px;
  padding: 8px;
  font-size: 14px;
  color: white;
  font-weight: bold;
}
.r { background: #c33; top: 30px;  left: 30px;  z-index: 1; }
.g { background: #393; top: 60px;  left: 90px;  z-index: 3; }
.b { background: #36c; top: 90px;  left: 150px; z-index: 2; }
.k { background: #222; top: 120px; left: 210px; z-index: 0; }
.legend { font-size: 12px; color: #555; margin-top: 8px; }
</style>
</head>
<body>
<div class="frame">
  <div class="box r">red z=1</div>
  <div class="box g">green z=3</div>
  <div class="box b">blue z=2</div>
  <div class="box k">black z=0</div>
</div>
<div class="legend">expected stack from back to front: black(0), red(1), blue(2), green(3). Source order is red, green, blue, black; without z-sort the black box would paint on top.</div>
</body>
</html>
